<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Библиотека знаний</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/app.css">
</head>
<body data-page="library">
<div class="file-hint">редактируете: library.html · js/library.js · js/data.js</div>

<div class="page-shell">
  <div class="page-hdr">
    <div>
      <h2>Библиотека знаний</h2>
      <p>Загруженные Word-документы · слева список, справа содержимое</p>
    </div>
    <div class="page-hdr-actions">
      <a class="btn btn-outline btn-sm" href="learn.html">Обучение</a>
      <a class="btn btn-outline btn-sm" href="index.html">← На главную</a>
    </div>
  </div>
  <div class="page-body">
    <div class="learn-grid" style="grid-template-columns: 300px 1fr; min-height: 560px">
      <div class="panel">
        <div class="panel-h">
          <div>
            <h3>Документы</h3>
            <span id="lib-count">0 в базе</span>
          </div>
        </div>
        <div class="lib-search"><input id="lib-filter" placeholder="Фильтр по документам"></div>
        <div class="lib-list" id="lib-list"></div>
      </div>

      <div class="panel" style="display:flex;flex-direction:column;min-height:0">
        <div class="panel-h">
          <div>
            <h3 id="doc-title">Выберите документ</h3>
            <span id="doc-meta">содержимое появится справа</span>
          </div>
        </div>
        <div id="doc-body" class="slide-box" style="flex:1;overflow:auto">
          <p style="color:var(--muted);font-size:14px;line-height:1.6">Нажмите документ слева, чтобы открыть его текст.</p>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="js/data.js"></script>
<script src="js/nav.js"></script>
<script src="js/library.js"></script>
</body>
</html>
