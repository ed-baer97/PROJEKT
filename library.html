<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Библиотека знаний</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/app.css">
</head>
<body data-page="library">
<div class="file-hint">редактируете: library.html · js/library.js · js/data.js</div>

<div class="page-shell" style="max-width:720px">
  <div class="page-hdr">
    <div>
      <h2>Библиотека знаний</h2>
      <p>Загруженные Word-документы в базе проекта</p>
    </div>
    <div class="page-hdr-actions">
      <a class="btn btn-outline btn-sm" href="learn.html">Обучение</a>
      <a class="btn btn-outline btn-sm" href="index.html">← На главную</a>
    </div>
  </div>
  <div class="page-body">
    <div class="panel">
      <div class="panel-h">
        <div>
          <h3>Документы</h3>
          <span id="lib-count">0 в базе</span>
        </div>
      </div>
      <div class="lib-search"><input id="lib-filter" placeholder="Фильтр по документам"></div>
      <div class="lib-list" id="lib-list" style="max-height:none;padding-bottom:16px"></div>
    </div>
    <div class="note" style="margin-top:14px;font-size:12.5px;color:var(--muted);line-height:1.55;padding:12px 14px;background:#f7fbfa;border:1px solid var(--line);border-radius:12px">
      Материалы загружаются вручную. Презентации, тесты и чат — на странице <a href="learn.html" style="color:var(--teal);font-weight:700">Обучение</a>.
    </div>
  </div>
</div>

<script src="js/data.js"></script>
<script src="js/nav.js"></script>
<script src="js/library.js"></script>
</body>
</html>
