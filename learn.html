<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Обучение QNP</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/app.css">
</head>
<body data-page="learn">
<div class="file-hint">редактируете: learn.html · js/learn.js</div>

<div class="page-shell">
  <div class="page-hdr">
    <div>
      <h2>Обучение QNP</h2>
      <p>Презентация → тест → чат-бот по материалам базы</p>
    </div>
    <div class="page-hdr-actions">
      <a class="btn btn-primary btn-sm" href="library.html">Библиотека знаний</a>
      <a class="btn btn-outline btn-sm" href="index.html">← На главную</a>
    </div>
  </div>
  <div class="page-body">
    <div class="learn-top" id="section-chips" style="margin-bottom:12px"></div>

    <div class="learn-grid" style="grid-template-columns: 1fr 340px; min-height: 560px">
      <!-- Слева: презентация и тест -->
      <div class="panel" style="display:flex;flex-direction:column;min-height:0">
        <div class="tabs">
          <button class="tab active" type="button" data-ltab="pres">Презентация</button>
          <button class="tab" type="button" data-ltab="test">Тест</button>
        </div>
        <div class="panel-h">
          <h3 id="learn-panel-title">Обучающая презентация</h3>
          <span class="ai-tag">✦ Сгенерировано ИИ</span>
        </div>

        <div id="ltab-pres" style="display:flex;flex-direction:column;flex:1;min-height:0">
          <div class="slide-box" id="slide-body"></div>
          <div class="slide-nav">
            <button class="btn btn-outline btn-sm" type="button" id="prev-slide">← Назад</button>
            <div class="dots" id="slide-dots"></div>
            <button class="btn btn-primary btn-sm" type="button" id="next-slide">Далее →</button>
          </div>
        </div>

        <div id="ltab-test" style="display:none;flex-direction:column;flex:1;min-height:0;overflow:auto">
          <div id="learn-result"></div>
          <div id="test-questions"></div>
          <div style="padding:12px 16px;display:flex;gap:8px">
            <button class="btn btn-primary btn-sm" type="button" id="check-test">Проверить ответы</button>
            <button class="btn btn-outline btn-sm" type="button" id="reset-test">Сбросить</button>
          </div>
        </div>
      </div>

      <!-- Справа: чат-бот -->
      <div class="panel" style="display:flex;flex-direction:column;min-height:0">
        <div class="panel-h">
          <h3>Чат-бот</h3>
          <span class="ai-tag">✦</span>
        </div>
        <div class="chat-log" id="chat-log">
          <div class="msg bot">Спросите по материалам текущего раздела — отвечу со ссылкой на документ.</div>
        </div>
        <div class="chat-hints" style="padding:0 12px 8px;display:flex;flex-direction:column;gap:5px">
          <button class="chip" type="button" data-q="Сколько КП нужно для выбора поставщика?">Сколько КП нужно?</button>
          <button class="chip" type="button" data-q="Как согласовать договор с подрядчиком?">Как согласовать договор?</button>
          <button class="chip" type="button" data-q="Какая погода завтра?">Вопрос не по базе</button>
        </div>
        <div class="chat-input">
          <input id="chat-text" placeholder="Вопрос по материалам…">
          <button class="btn-icon" type="button" id="chat-send">↑</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="js/data.js"></script>
<script src="js/nav.js"></script>
<script src="js/learn.js"></script>
</body>
</html>
